name: Daily Radiografia Video

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      modo_test:
        description: "Skip Instagram publishing"
        type: boolean
        default: false
      usar_ejemplo:
        description: "Use example insight JSON instead of scraping"
        type: boolean
        default: false
      skip_audio:
        description: "Skip ElevenLabs TTS, use silent placeholder"
        type: boolean
        default: false

env:
  PYTHONPATH: ${{ github.workspace }}
  TZ: America/Lima

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg jq chromium-browser || sudo apt-get install -y ffmpeg jq chromium

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate daily insight
        id: insight
        env:
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USERNAME: ${{ secrets.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          NEO4J_DATABASE: ${{ secrets.NEO4J_DATABASE }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_BASE_URL: "https://openrouter.ai/api/v1"
          ANTHROPIC_MODEL: "anthropic/claude-haiku-4-5"
        run: |
          today="$(TZ=America/Lima date +%Y_%m_%d)"
          path="insights/insight_${today}.json"
          mkdir -p insights
          echo "date=${today}" >> "$GITHUB_OUTPUT"
          echo "path=${path}" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event.inputs.usar_ejemplo }}" = "true" ]; then
            cp insights/insight_example_mtc.json "$path"
            echo "no_cases=false" >> "$GITHUB_OUTPUT"
            echo "Using example insight JSON."
          elif python insights_app/main.py --output "$path"; then
            echo "no_cases=false" >> "$GITHUB_OUTPUT"
          else
            code=$?
            if [ "$code" = "1" ]; then
              echo "no_cases=true" >> "$GITHUB_OUTPUT"
              echo "No actionable cases today."
            else
              exit "$code"
            fi
          fi

      - name: Upload insight artifact
        if: steps.insight.outputs.no_cases != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: insight-${{ steps.insight.outputs.date }}
          path: ${{ steps.insight.outputs.path }}
          retention-days: 90

      - name: Generate ElevenLabs voiceover
        id: audio
        if: steps.insight.outputs.no_cases != 'true'
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
        run: |
          mkdir -p assets
          if [ "${{ github.event.inputs.skip_audio }}" = "true" ]; then
            echo "INFO: skip_audio=true, generating 20s silent placeholder"
            ffmpeg -f lavfi -i anullsrc=channel_layout=mono:sample_rate=44100 -t 20 -c:a libmp3lame -b:a 128k -y assets/voiceover.mp3
            echo "duration=20" >> "$GITHUB_OUTPUT"
          else
            chmod +x scripts/generate_audio.sh
            output="$(bash scripts/generate_audio.sh "${{ steps.insight.outputs.path }}")"
            echo "$output"
            duration="$(echo "$output" | awk -F= '/AUDIO_DURATION_SECONDS=/{print $2}' | tail -1)"
            test -n "$duration"
            echo "duration=${duration}" >> "$GITHUB_OUTPUT"
          fi

      - name: Patch insight JSON with duration and scene timestamps
        if: steps.insight.outputs.no_cases != 'true'
        run: |
          python3 - "${{ steps.insight.outputs.path }}" "${{ steps.audio.outputs.duration }}" <<'PYEOF'
          import json, math, sys

          insight_path, duration_str = sys.argv[1], sys.argv[2]
          audio_duration = float(duration_str)
          dur_ceil = math.ceil(audio_duration)

          with open(insight_path, encoding="utf-8") as f:
              insight = json.load(f)

          insight["output"]["duration_seconds"] = dur_ceil

          try:
              with open("assets/voiceover_timestamps.json", encoding="utf-8") as f:
                  ts = json.load(f)
              st = ts["scene_times"]
              scene_order = ["t_intro","t_facts","t_context","t_compare","t_punch","t_cta"]
              labels      = ["intro","facts","context","compare","punch","cta"]
              times = [st[k] for k in scene_order]
              segments = []
              for i, (label, start) in enumerate(zip(labels, times)):
                  end = times[i+1] if i+1 < len(times) else dur_ceil
                  segments.append({"start": round(start, 2), "end": round(end, 2), "label": label})
              insight["script"]["segments"] = segments
              insight["script"]["scene_times"] = st
              print(f"INFO: Patched duration={dur_ceil}s + {len(segments)} scene timestamps")
          except FileNotFoundError:
              print("WARNING: voiceover_timestamps.json not found, duration only patched")

          with open(insight_path, "w", encoding="utf-8") as f:
              json.dump(insight, f, indent=2, ensure_ascii=False)
          PYEOF

      - name: Build index.html with Claude Code skill
        id: claude
        if: steps.insight.outputs.no_cases != 'true'
        env:
          ANTHROPIC_API_KEY: ""
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_BASE_URL: "https://openrouter.ai/api"
          ANTHROPIC_DEFAULT_HAIKU_MODEL: "anthropic/claude-haiku-4.5"
          ANTHROPIC_DEFAULT_SONNET_MODEL: "anthropic/claude-sonnet-4.6"
          ANTHROPIC_DEFAULT_OPUS_MODEL: "anthropic/claude-sonnet-4.6"
          DISABLE_TELEMETRY: "1"
        run: |
          echo "Using Claude Code through OpenRouter."
          claude -p "/radiografia procesa el insight de hoy con duracion de audio ${{ steps.audio.outputs.duration }} segundos" \
            --allowedTools "Bash,Read,Write,Edit,Glob" \
            --output-format json | tee claude_run.json
          case_title="$(jq -r '.result.case_title // .case_title // "Radiografia del Gasto Publico"' claude_run.json 2>/dev/null || true)"
          entity_name="$(jq -r '.result.entity_name // .entity_name // "Entidad publica"' claude_run.json 2>/dev/null || true)"
          echo "case_title=${case_title}" >> "$GITHUB_OUTPUT"
          echo "entity_name=${entity_name}" >> "$GITHUB_OUTPUT"

      - name: Validate prerender assets
        if: steps.insight.outputs.no_cases != 'true'
        run: |
          chmod +x scripts/validate_video.sh
          bash scripts/validate_video.sh

      - name: Render MP4 with HyperFrames
        id: render
        if: steps.insight.outputs.no_cases != 'true'
        run: |
          output="output/radiografia-${{ steps.insight.outputs.date }}.mp4"
          mkdir -p output
          npx hyperframes render . --output "$output" --workers auto
          echo "mp4=${output}" >> "$GITHUB_OUTPUT"

      - name: Validate rendered MP4
        if: steps.insight.outputs.no_cases != 'true'
        run: bash scripts/validate_video.sh "${{ steps.render.outputs.mp4 }}"

      - name: Upload MP4 artifact
        if: steps.insight.outputs.no_cases != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ steps.insight.outputs.date }}
          path: ${{ steps.render.outputs.mp4 }}
          retention-days: 30

      - name: Publish to Instagram
        if: steps.insight.outputs.no_cases != 'true' && github.event.inputs.modo_test != 'true'
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: |
          chmod +x scripts/publish_ig.sh
          bash scripts/publish_ig.sh "${{ steps.render.outputs.mp4 }}" "${{ steps.insight.outputs.path }}"

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "${DISCORD_WEBHOOK:-}" ]; then
            echo "DISCORD_WEBHOOK not configured; skipping."
            exit 0
          fi
          run_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          artifacts_url="${run_url}#artifacts"
          no_cases="${{ steps.insight.outputs.no_cases }}"
          if [ "$no_cases" = "true" ]; then
            status="Sin casos hoy"
            color=16776960
            title="Radiografia: sin casos publicables"
          elif [ "${{ job.status }}" = "success" ]; then
            status="Exito"
            color=4906624
            title="${{ steps.claude.outputs.case_title }}"
          else
            status="Fallo"
            color=15681604
            title="Radiografia: workflow fallo"
          fi
          payload="$(jq -n \
            --arg title "$title" \
            --arg status "$status" \
            --arg run "$run_url" \
            --arg artifacts "$artifacts_url" \
            --arg entity "${{ steps.claude.outputs.entity_name }}" \
            --argjson color "$color" \
            '{embeds:[{title:$title,color:$color,fields:[
              {name:"Estado",value:$status,inline:true},
              {name:"Entidad",value:($entity // "N/A"),inline:true},
              {name:"Run",value:$run,inline:false},
              {name:"Artifacts",value:$artifacts,inline:false}
            ]}]}' )"
          curl -sS -X POST "$DISCORD_WEBHOOK" -H "Content-Type: application/json" -d "$payload"
